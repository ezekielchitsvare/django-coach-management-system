<div class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div class="min-w-0">
        {% if eyebrow %}
            <p class="text-sm font-semibold uppercase tracking-[0.2em] text-teal-400">{{ eyebrow }}</p>
        {% endif %}
        <h1 class="mt-2 text-3xl font-bold text-white sm:text-4xl">{{ title }}</h1>
        {% if description %}
            <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-400 sm:text-base">{{ description }}</p>
        {% endif %}
    </div>

    {% if back_url or primary_url %}
        <div class="flex flex-wrap gap-3">
            {% if back_url %}
                <a href="{{ back_url }}"
                   class="inline-flex items-center justify-center rounded-xl border border-slate-700 bg-slate-900/90 px-4 py-2.5 text-sm font-semibold text-slate-200 transition duration-200 hover:-translate-y-px hover:border-slate-500 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-400/60">
                    {{ back_label|default:"Back" }}
                </a>
            {% endif %}

            {% if primary_url %}
                <a href="{{ primary_url }}"
                   class="inline-flex items-center justify-center rounded-xl bg-teal-500 px-5 py-2.5 text-sm font-semibold text-slate-950 shadow-lg shadow-teal-950/30 transition duration-200 hover:-translate-y-px hover:bg-teal-400 focus:outline-none focus:ring-2 focus:ring-teal-400/60">
                    {{ primary_label }}
                </a>
            {% endif %}
        </div>
    {% endif %}
</div>
