{% extends 'core/base.html' %}

{% block title %}Edit team - ({{ team.name }}){% endblock %}

{% block content %}
    <div class="px-6 py-6 text-white">
        <div class="mx-auto max-w-2xl">
             <h1 class="mb-6 text-2xl font-bold">Edit team - {{ team.name }}</h1> 

             <div class="rounded-2xl border border-slate-700 bg-slate-900 p-6 shadow">
                 <form method="post" action="." class="space-y-4">
                    {% csrf_token %}

                    {{ form.as_p }}

                     <div class="flex flex-wrap gap-3">
                        <button class="rounded-xl bg-teal-500 px-8 py-4 font-semibold text-slate-950 hover:bg-teal-400">Submit</button>
                        <a href="{% url 'team:detail' team.id %}" class="rounded-xl border border-slate-600 px-8 py-4 font-semibold text-slate-200 hover:bg-slate-800">Cancel</a>
                     </div>
                 </form>
             </div>
        </div>
    </div>
         
{% endblock %}
